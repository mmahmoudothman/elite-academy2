
<!DOCTYPE html>

<head>

    <title>ELITE ACADEMY | Innovative Executive Learning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Neuton:wght@400;700;800&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #0da993;
            --brand-secondary: #3d66f1;
            --brand-navy: #0d1b2a;
            --brand-cream: #e8e4d8;
            --brand-blue: #4167e0;
            --brand-royal: #3d66f1;
        }
        body {
            font-family: 'Plus Jakarta Sans', 'Cairo', sans-serif;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            background-color: #ffffff;
        }
        [dir="rtl"] {
            font-family: 'Cairo', sans-serif;
        }
        .font-heading {
            font-family: 'Neuton', 'Cairo', serif;
            letter-spacing: -0.01em;
        }
        .glass-light {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .innovative-gradient {
            background: linear-gradient(135deg, #3d66f1 0%, #0da993 100%);
        }
        .brand-gradient {
            background: linear-gradient(135deg, #3d66f1, #0da993);
        }
        .brand-gradient-subtle {
            background: linear-gradient(135deg, #4167e0, #0da993);
        }
        .text-innovative {
            color: var(--brand-primary);
        }
        .bg-innovative {
            background-color: var(--brand-primary);
        }
        .btn-action {
            background: linear-gradient(135deg, #3d66f1, #0da993);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-action:hover {
            background: linear-gradient(135deg, #4167e0, #0da993);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(13, 169, 147, 0.4);
        }
        .card-innovative {
            background: white;
            border: 1px solid #f1f5f9;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-innovative:hover {
            border-color: #0da993;
            box-shadow: 0 30px 60px -12px rgba(13, 27, 42, 0.08);
            transform: translateY(-5px);
        }
        .hero-shape {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #0d1b2a 0%, #1a2744 100%);
            clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
            z-index: -1;
        }
        [dir="rtl"] .hero-shape {
            left: 0;
            right: auto;
            clip-path: polygon(0% 0%, 75% 0%, 100% 100%, 0% 100%);
        }
        .glass-dark {
            background: rgba(26, 39, 68, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceIn {
            0% { transform: scale(0); }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
